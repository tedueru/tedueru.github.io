            - link "Eşitlik ertelenemez! Bugün TEDÜ ERU ekibi olarak ODTÜ'de düzenlenen İBKİ (İktisat Biliminde Kadın İnisiyatifi) Konferansı'ndaydık. Sayın Ayça Tekin-Koru hocamızın ilham veren açılış konuşmasıyla başlayan; sayın Nazire Nergiz Dinçer hocamızın katkılarda bulunduğu değerli, harika bir etkinlikti. Emeği geçen herkese teşekkürler! ✨ Equality cannot be postponed! Today, as the TEDU ERU team, we were at the İBKİ (Women's Initiative in Economic Science) Conference held at METU. It was a great event that started with the inspiring opening speech of our teacher Ayça Tekin-Koru and contributed by our teacher Nazire Nergiz Dinçer. Thank you to everyone who contributed! ✨ @universityted @tedusca Carousel" [ref=e238] [cursor=pointer]:
